<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>海外广告线索搜索台</title><style>
:root{--bg:#07101f;--panel:#0c1830;--line:#1c3154;--text:#e8f0ff;--muted:#8da2c8;--cyan:#27d8ff;--violet:#8b5cf6;--green:#39e6a2}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 80% 0,#17265a 0,transparent 35%),var(--bg);color:var(--text);font:14px Inter,"Microsoft YaHei",sans-serif}.app{max-width:1440px;margin:auto;padding:24px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px}.brand{font-size:22px;font-weight:800}.brand i{color:var(--cyan);font-style:normal}.status{color:var(--green)}.grid{display:grid;grid-template-columns:340px 1fr;gap:18px}.panel{background:linear-gradient(145deg,#0d1b35dd,#091329ee);border:1px solid var(--line);border-radius:16px;box-shadow:0 14px 50px #0005}.filters{padding:18px;max-height:calc(100vh - 100px);overflow:auto}.section{border-bottom:1px solid #172944;padding:0 0 16px;margin-bottom:16px}.section:last-child{border:0}.section h3{font-size:13px;margin:0 0 10px;color:#bfd0f3}.chips{display:flex;flex-wrap:wrap;gap:7px}.chip{border:1px solid #29436c;background:#0a152b;color:#9eb2d7;padding:7px 10px;border-radius:9px;cursor:pointer}.chip.on{border-color:var(--cyan);background:#113454;color:#ddfaff;box-shadow:0 0 16px #27d8ff22}.selectall{float:right;color:var(--cyan);font-size:12px;cursor:pointer}.run{width:100%;border:0;padding:13px;border-radius:10px;background:linear-gradient(90deg,var(--violet),var(--cyan));color:white;font-weight:800;cursor:pointer}.main{display:flex;flex-direction:column;gap:18px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.stat{padding:18px}.stat b{font-size:26px;display:block;margin-top:8px}.stat small{color:var(--muted)}.toolbar{display:flex;gap:10px;padding:14px}.toolbar input{flex:1;background:#071225;border:1px solid #263c60;color:white;border-radius:9px;padding:11px}.btn{background:#142647;border:1px solid #2b4772;color:#d9e7ff;border-radius:9px;padding:10px 14px;cursor:pointer}.progress{height:5px;background:#101f39;border-radius:5px;overflow:hidden}.progress i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--violet),var(--cyan));transition:.3s}.tablebox{overflow:auto}.tabletitle{padding:16px 18px;border-bottom:1px solid var(--line);font-weight:700}table{width:100%;border-collapse:collapse;min-width:950px}th,td{text-align:left;padding:13px 14px;border-bottom:1px solid #152641;vertical-align:top}th{font-size:12px;color:var(--muted)}td a{color:var(--cyan);text-decoration:none}.badge{display:inline-block;background:#17335b;color:#aeefff;padding:4px 7px;border-radius:6px;margin:2px}.product{display:flex;gap:9px}.thumb{width:42px;height:42px;border-radius:8px;background:linear-gradient(135deg,#8b5cf6,#27d8ff)}.empty{text-align:center;padding:56px;color:var(--muted)}.note{font-size:12px;color:var(--muted);line-height:1.6;margin-top:12px}@media(max-width:900px){.grid{grid-template-columns:1fr}.filters{max-height:none}.stats{grid-template-columns:repeat(2,1fr)}}
</style></head><body><div class="app"><div class="top"><div class="brand">AD LEAD <i>HUNTER</i> <small>海外广告线索搜索台</small></div><div class="status">● 离线模式可用</div></div><div class="grid"><aside class="panel filters">
<div class="section" data-group="platform"><h3>广告平台 <span class="selectall">全选</span></h3><div class="chips"></div></div>
<div class="section" data-group="country"><h3>目标国家 <span class="selectall">全选</span></h3><div class="chips"></div></div>
<div class="section" data-group="category"><h3>商品品类 <span class="selectall">全选</span></h3><div class="chips"></div></div>
<div class="section" data-group="intent"><h3>搜索词路 <span class="selectall">全选</span></h3><div class="chips"></div></div>
<button class="run" id="run">开始搜索公开线索</button><div class="note">离线演示版使用示例数据验证筛选、去重和导出流程。真实抓取需接入合法的平台 API 或后端采集服务；不会虚构真实订单量。</div></aside>
<main class="main"><div class="stats"><div class="panel stat"><small>搜索任务</small><b id="tasks">0</b></div><div class="panel stat"><small>发现广告</small><b id="ads">0</b></div><div class="panel stat"><small>去重店铺</small><b id="stores">0</b></div><div class="panel stat"><small>公开销售线索</small><b id="signals">0</b></div></div><div class="panel"><div class="toolbar"><input id="q" placeholder="搜索店铺、产品、域名或联系方式"><button class="btn" id="export">导出 CSV</button></div><div class="progress"><i id="bar"></i></div></div><div class="panel tablebox"><div class="tabletitle">线索结果 · 按最终店铺域名自动去重</div><div id="results" class="empty">选择左侧条件后开始搜索</div></div></main></div></div>
<script>
const options={platform:['Google Ads','Meta Ads','TikTok Ads','Microsoft Ads','Pinterest','LinkedIn','Snapchat','Reddit'],country:['美国','英国','德国','法国','加拿大','澳大利亚','西班牙','意大利','荷兰','瑞典','挪威','波兰','日本','韩国','新加坡','阿联酋','沙特','巴西','墨西哥','智利','哥伦比亚','阿根廷','秘鲁','厄瓜多尔','乌拉圭','南非','新西兰','奥地利'],category:['服装','鞋靴','美容个护','宠物用品','家居装饰','厨房用品','健身运动','消费电子','珠宝配饰','母婴用品','汽车用品','户外露营','游戏设备','太阳镜','泳装','礼品'],intent:['Shop now','Best seller','Limited offer','Free shipping','New arrival','50% off','Buy now','Shopify store','Trending product','Problem solver','TikTok made me buy it','Summer sale','Gift idea','Bundle deal','Clearance','DTC brand']};
for(const [g,arr] of Object.entries(options)){let box=document.querySelector(`[data-group="${g}"] .chips`);arr.forEach((x,i)=>{let b=document.createElement('button');b.className='chip'+(i<3?' on':'');b.textContent=x;b.onclick=()=>b.classList.toggle('on');box.appendChild(b)})}document.querySelectorAll('.selectall').forEach(s=>s.onclick=()=>{let a=[...s.closest('.section').querySelectorAll('.chip')],all=a.every(x=>x.classList.contains('on'));a.forEach(x=>x.classList.toggle('on',!all));s.textContent=all?'全选':'清空'});
const ids={run:document.getElementById('run'),results:document.getElementById('results'),tasks:document.getElementById('tasks'),ads:document.getElementById('ads'),stores:document.getElementById('stores'),signals:document.getElementById('signals'),bar:document.getElementById('bar'),q:document.getElementById('q'),exportBtn:document.getElementById('export')};const demo=[{store:'Nova Nest',domain:'novanest-demo.com',platform:'Meta, TikTok',country:'美国',ads:18,product:'CloudRest Pet Bed',price:'$49.90',contact:'hello@novanest-demo.com',reviews:1284,signal:'1,000+ sold（公开文本）'},{store:'Luma Living',domain:'lumaliving-demo.co',platform:'Google, Pinterest',country:'英国',ads:11,product:'Aurora Sunset Lamp',price:'$36.00',contact:'support@lumaliving-demo.co',reviews:842,signal:'Best selling #1'},{store:'Paw Halo',domain:'pawhalo-demo.com',platform:'Meta, Google',country:'德国',ads:24,product:'No-Spill Travel Bowl',price:'€29.95',contact:'+49 30 000000',reviews:2106,signal:'2,000+ reviews'},{store:'Casa Vitta',domain:'casavitta-demo.com.br',platform:'TikTok, Meta',country:'巴西',ads:9,product:'Mini Portable Blender',price:'R$189',contact:'oi@casavitta-demo.com.br',reviews:517,signal:'Mais vendido'}];let rows=[];
function render(data){if(!data.length){ids.results.className='empty';ids.results.innerHTML='没有匹配结果';return}ids.results.className='';ids.results.innerHTML=`<table><thead><tr><th>店铺</th><th>平台 / 国家</th><th>广告数据</th><th>公开畅销产品</th><th>销售线索</th><th>联系方式</th></tr></thead><tbody>${data.map(x=>`<tr><td><b>${x.store}</b><br><a href="https://${x.domain}" target="_blank">${x.domain}</a></td><td><span class="badge">${x.platform}</span><br>${x.country}</td><td>${x.ads} 条广告<br><small>同域名已合并</small></td><td><div class="product"><i class="thumb"></i><div><b>${x.product}</b><br>${x.price}<br><small>公开 Best selling #1</small></div></div></td><td>${x.signal}<br>${x.reviews} 条评论</td><td><button class="btn copy" data-v="${x.contact}">复制</button><br><small>${x.contact}</small></td></tr>`).join('')}</tbody></table>`;document.querySelectorAll('.copy').forEach(b=>b.onclick=async()=>{try{await navigator.clipboard.writeText(b.dataset.v);b.textContent='已复制'}catch{prompt('复制联系方式：',b.dataset.v)}})}
ids.run.onclick=()=>{let n=[...document.querySelectorAll('.chip.on')].length;ids.tasks.textContent=n*12;ids.bar.style.width='15%';ids.run.disabled=true;ids.run.textContent='正在合并与去重…';setTimeout(()=>ids.bar.style.width='62%',350);setTimeout(()=>{rows=demo;render(rows);ids.ads.textContent=rows.reduce((a,b)=>a+b.ads,0);ids.stores.textContent=rows.length;ids.signals.textContent=rows.reduce((a,b)=>a+b.reviews,0).toLocaleString();ids.bar.style.width='100%';ids.run.disabled=false;ids.run.textContent='重新搜索';},900)};
ids.q.oninput=()=>{let v=ids.q.value.toLowerCase();render(rows.filter(x=>Object.values(x).join(' ').toLowerCase().includes(v)))};ids.exportBtn.onclick=()=>{if(!rows.length)return alert('请先运行搜索');let heads=['店铺','域名','平台','国家','广告数量','公开畅销产品','价格','公开销售线索','评论数','联系方式'];let csv=[heads,...rows.map(x=>[x.store,x.domain,x.platform,x.country,x.ads,x.product,x.price,x.signal,x.reviews,x.contact])].map(r=>r.map(v=>'"'+String(v).replaceAll('"','""')+'"').join(',')).join('\n');let a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\ufeff'+csv],{type:'text/csv'}));a.download='海外广告店铺线索.csv';a.click()};
</script></body></html>
